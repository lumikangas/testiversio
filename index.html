<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <title>Polaroid Studio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Permanent+Marker&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #3b82f6;
            --bg: #000;
            --panel: rgba(15, 15, 18, 0.98);
            --safe-bottom: env(safe-area-inset-bottom, 24px);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
        }

        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
        }

        canvas {
            max-width: 95%;
            max-height: 95%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
            background: #fff;
            touch-action: none;
            border-radius: 1px;
        }

        /* Tyhjä tila / Polaroidin kehys */
        .polaroid-placeholder {
            width: 280px;
            height: 340px;
            background: #fff;
            border-radius: 2px;
            padding: 16px 16px 60px 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }
        .photo-slot {
            flex: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .controls {
            flex-shrink: 0;
            height: 42dvh;
            min-height: 380px;
            background: var(--panel);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            display: flex;
            flex-direction: column;
            padding-bottom: var(--safe-bottom);
            z-index: 50;
        }

        .tab-bar {
            display: flex;
            padding: 16px 20px 8px;
            gap: 20px;
            justify-content: center;
        }

        .tab-btn {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #444;
            position: relative;
            padding: 8px 12px;
        }

        .tab-btn.active { color: #fff; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--accent); border-radius: 3px;
        }

        .settings-pane {
            flex: 1;
            overflow-y: auto;
            padding: 10px 24px;
            -webkit-overflow-scrolling: touch;
        }

        .control-group { margin-bottom: 22px; }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 12px; border-radius: 6px; margin: 14px 0; background: #1a1a1e;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 34px; height: 34px; background: #fff; border-radius: 50%; border: 4px solid #000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #redChan { background: linear-gradient(to right, #330000, #ff0000); }
        #greenChan { background: linear-gradient(to right, #003300, #00ff00); }
        #blueChan { background: linear-gradient(to right, #000033, #0000ff); }
        
        .filter-btn {
            flex: 1;
            padding: 10px 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            color: #666;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: #fff;
            color: #000;
        }

        .control-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: #777; text-transform: uppercase; }
        .control-val { color: #fff; }

        #previewOverlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 16px;
        }
        #previewImg { max-width: 100%; max-height: 82vh; border-radius: 2px; }

        .btn-main {
            background: #fff; color: #000; font-weight: 800; text-transform: uppercase; 
            padding: 18px; border-radius: 16px; font-size: 13px; width: 100%;
        }
        .marker-font { font-family: 'Permanent Marker', cursive; }
    </style>
</head>
<body>

    <div class="viewport" id="viewport">
        <canvas id="mainCanvas" class="hidden"></canvas>
        
        <!-- Alkunäkymä ilman kuvaa -->
        <div id="emptyState" class="flex flex-col items-center">
            <div class="polaroid-placeholder">
                <div class="photo-slot">
                     <label class="cursor-pointer group flex flex-col items-center">
                        <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                        </div>
                        <span class="text-[10px] text-white font-bold tracking-[0.2em] uppercase">Load Image</span>
                        <input type="file" id="imgInput" accept="image/*" class="hidden">
                     </label>
                </div>
                <div class="mt-4 flex justify-between items-center px-1 opacity-20">
                    <span class="text-[10px] font-black text-black">600 FILM</span>
                    <div class="flex gap-1">
                        <div class="w-2 h-2 rounded-full bg-red-500"></div>
                        <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                    </div>
                </div>
            </div>
            <p class="mt-8 text-[9px] font-bold uppercase tracking-[0.5em] text-white/20">Polaroid 600 SE</p>
        </div>

        <button onclick="showPreview()" id="inspectBtn" class="absolute bottom-6 right-6 w-14 h-14 bg-white/10 backdrop-blur-xl border border-white/20 rounded-full flex items-center justify-center hidden active:scale-90 transition-transform">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </button>
    </div>

    <div class="controls">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('optics', this)">Photo</button>
            <button class="tab-btn" onclick="switchTab('color', this)">Chemicals</button>
            <button class="tab-btn" onclick="switchTab('finish', this)">Finalize</button>
        </div>

        <!-- Kamera-asetukset -->
        <div class="settings-pane" id="opticsPane">
            <div class="control-group">
                <div class="control-label"><span>Zoom</span><span class="control-val" id="zoomVal">1.0x</span></div>
                <input type="range" id="zoom" min="0.5" max="3.5" step="0.01" value="1.0">
            </div>
            <div class="control-group">
                <div class="control-label"><span>Rotate</span><span class="control-val" id="rotVal">0°</span></div>
                <input type="range" id="rotation" min="-180" max="180" value="0">
            </div>
        </div>

        <!-- Kemialliset säädöt -->
        <div class="settings-pane hidden" id="colorPane">
            <div class="control-group">
                <div class="control-label"><span>Exposure</span><span class="control-val" id="expVal">100%</span></div>
                <input type="range" id="exposure" min="40" max="180" value="100">
            </div>

            <div class="mb-4">
                <div class="control-label mb-3"><span>B&W Processing</span></div>
                <div class="flex gap-2">
                    <button class="filter-btn active" data-mode="none" onclick="setMode('none', this)">None</button>
                    <button class="filter-btn" data-mode="neutral" onclick="setMode('neutral', this)">Classic</button>
                    <button class="filter-btn" data-mode="yellow" onclick="setMode('yellow', this)">Yellow</button>
                    <button class="filter-btn" data-mode="red" onclick="setMode('red', this)">Red</button>
                    <button class="filter-btn" data-mode="sepia" onclick="setMode('sepia', this)">Sepia</button>
                </div>
            </div>

            <div id="bwMixControl" class="control-group opacity-50 transition-opacity">
                <div class="control-label"><span>Filter Strength</span><span class="control-val" id="mixVal">0%</span></div>
                <input type="range" id="bwMix" min="0" max="100" value="0">
            </div>

            <div id="colorTintSection">
                <div class="control-label"><span>Chemical Tint</span></div>
                <div class="flex flex-col gap-1 mt-2">
                    <input type="range" id="redChan" min="-50" max="50" value="0" class="!my-2">
                    <input type="range" id="greenChan" min="-50" max="50" value="0" class="!my-2">
                    <input type="range" id="blueChan" min="-50" max="50" value="0" class="!my-2">
                </div>
            </div>
        </div>

        <!-- Viimeistely -->
        <div class="settings-pane hidden" id="finishPane">
            <div class="control-group">
                <div class="control-label"><span>Film Grain</span><span class="control-val" id="grainVal">30</span></div>
                <input type="range" id="grain" min="0" max="250" value="30">
            </div>
            <div class="control-group">
                <div class="control-label"><span>Gloss</span><span class="control-val" id="glossVal">0</span></div>
                <input type="range" id="gloss" min="0" max="150" value="0">
            </div>
            <input type="text" id="markerText" placeholder="Write Text..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 mb-4 text-white marker-font outline-none text-lg text-center">
            <div class="control-group">
                <div class="control-label"><span>Text Size</span><span class="control-val" id="textSizeVal">1.0x</span></div>
                <input type="range" id="textSize" min="0.5" max="6" step="0.1" value="1.0">
            </div>
        </div>

        <div class="px-6 py-4 flex gap-4 mt-auto border-t border-white/5">
            <label class="flex-1">
                <div class="w-full h-full flex items-center justify-center bg-white/5 border border-white/10 rounded-2xl font-bold text-[11px] uppercase tracking-[0.2em] active:bg-white/10">Load</div>
                <input type="file" id="imgInputAlt" accept="image/*" class="hidden">
            </label>
            <button id="exportBtn" class="btn-main flex-[2.5] active:scale-[0.98] transition-transform">Develop Photo</button>
        </div>
    </div>

    <div id="previewOverlay" onclick="hidePreview()">
        <p class="text-white/40 text-[10px] font-bold uppercase tracking-[0.3em] mb-4">Tap to close • Long-press to save</p>
        <img id="previewImg" src="" alt="Polaroid Preview">
        <button class="mt-8 px-10 py-4 bg-white/5 rounded-full text-[11px] font-bold uppercase tracking-widest border border-white/10">Back to Studio</button>
    </div>

<script>
    /**
     * PWA Service Worker -suojaus.
     * Esikatseluympäristöissä sw.js ei välttämättä ole saatavilla samassa polussa,
     * joten suojataan rekisteröinti virheiltä hiekkalaatikossa.
     */
    const isSandbox = window.location.hostname.includes('goog') || window.location.protocol === 'blob:';
    if ('serviceWorker' in navigator && !isSandbox) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Service Worker registered'))
                .catch(err => {
                    // Hiljainen lokitus jos ollaan vielä kehitysvaiheessa
                    console.warn('PWA Registration skipped in this environment.');
                });
        });
    }

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const BASE_S = 2400, MARGIN = 160, FOOTER = 640;
    const TOTAL_W = BASE_S + (MARGIN * 2), TOTAL_H = BASE_S + MARGIN + FOOTER;

    const buffer = document.createElement('canvas');
    const bCtx = buffer.getContext('2d');
    
    // Filmin kohina (Grain)
    const noiseBuffer = document.createElement('canvas');
    const nCtx = noiseBuffer.getContext('2d');
    function updateNoise() {
        noiseBuffer.width = 512; noiseBuffer.height = 512;
        const idata = nCtx.createImageData(512, 512);
        for(let i=0; i<idata.data.length; i+=4) {
            const v = Math.random() > 0.5 ? (Math.random() * 255) : (Math.random() * 80);
            idata.data[i] = v; idata.data[i+1] = v; idata.data[i+2] = v; idata.data[i+3] = 255;
        }
        nCtx.putImageData(idata, 0, 0);
    }
    updateNoise();

    let state = { img: null, x: 0, y: 0, lastX: 0, lastY: 0, isDragging: false, currentMode: 'none' };

    const ui = {};
    ['zoom', 'rotation', 'exposure', 'bwMix', 'redChan', 'greenChan', 'blueChan', 'grain', 'gloss', 'markerText', 'textSize']
    .forEach(id => {
        ui[id] = document.getElementById(id);
        ui[id].oninput = () => { updateLabels(); draw(false); };
    });

    function setMode(mode, btn) {
        state.currentMode = mode;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const mixCtrl = document.getElementById('bwMixControl');
        if (mode === 'none') {
            mixCtrl.classList.add('opacity-50');
            ui.bwMix.value = 0;
        } else {
            mixCtrl.classList.remove('opacity-50');
            if(ui.bwMix.value == 0) ui.bwMix.value = 100;
        }
        
        updateLabels();
        draw(false);
    }

    function updateLabels() {
        document.getElementById('zoomVal').innerText = parseFloat(ui.zoom.value).toFixed(1) + 'x';
        document.getElementById('rotVal').innerText = ui.rotation.value + '°';
        document.getElementById('expVal').innerText = ui.exposure.value + '%';
        document.getElementById('mixVal').innerText = ui.bwMix.value + '%';
        document.getElementById('grainVal').innerText = ui.grain.value;
        document.getElementById('glossVal').innerText = ui.gloss.value;
        document.getElementById('textSizeVal').innerText = parseFloat(ui.textSize.value).toFixed(1) + 'x';

        const bw = parseInt(ui.bwMix.value);
        document.getElementById('colorTintSection').style.opacity = (100 - (bw * 0.7)) / 100;
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.settings-pane').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId + 'Pane').classList.remove('hidden');
        btn.classList.add('active');
    }

    const handleImageLoad = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (v) => {
            const img = new Image();
            img.onload = () => {
                state.img = img;
                state.x = 0; state.y = 0;
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('mainCanvas').classList.remove('hidden');
                document.getElementById('inspectBtn').classList.remove('hidden');
                draw(true);
            };
            img.src = v.target.result;
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('imgInput').onchange = handleImageLoad;
    document.getElementById('imgInputAlt').onchange = handleImageLoad;

    function applyFilmEngine(context, w, h) {
        const exp = parseFloat(ui.exposure.value) / 100;
        const mix = parseInt(ui.bwMix.value) / 100;
        const mode = state.currentMode;
        
        const rT = parseInt(ui.redChan.value);
        const gT = parseInt(ui.greenChan.value);
        const bT = parseInt(ui.blueChan.value);

        const idata = context.getImageData(0, 0, w, h);
        const d = idata.data;
        
        for (let i = 0; i < d.length; i += 4) {
            let r = (d[i] + rT) * exp;
            let g = (d[i+1] + gT) * exp;
            let b = (d[i+2] + bT) * exp;

            if (mode !== 'none' && mix > 0) {
                let gray;
                switch(mode) {
                    case 'yellow': 
                        gray = (r * 0.5 + g * 0.45 + b * 0.05); 
                        break;
                    case 'red':    
                        gray = (r * 0.9 + g * 0.08 + b * 0.02); 
                        break;
                    case 'sepia':  
                        gray = (r * 0.3 + g * 0.59 + b * 0.11); 
                        break;
                    default:       
                        gray = (r * 0.299 + g * 0.587 + b * 0.114);
                }

                let targetR = gray, targetG = gray, targetB = gray;
                
                if (mode === 'sepia') {
                    targetR = gray + 38;
                    targetG = gray + 18;
                    targetB = gray - 12;
                }

                r = r * (1 - mix) + targetR * mix;
                g = g * (1 - mix) + targetG * mix;
                b = b * (1 - mix) + targetB * mix;
            }

            d[i] = Math.max(0, Math.min(255, r));
            d[i+1] = Math.max(0, Math.min(255, g));
            d[i+2] = Math.max(0, Math.min(255, b));
        }
        context.putImageData(idata, 0, 0);
    }

    function draw(highRes = false) {
        if(!state.img) return;
        const s = highRes ? 1 : (Math.min(window.innerWidth * 2, 800) / TOTAL_W);
        canvas.width = TOTAL_W * s; canvas.height = TOTAL_H * s;
        
        // Kehyksen pohja
        ctx.fillStyle = "#ffffff"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Brändäys (600)
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.06)";
        ctx.font = `800 ${46 * s}px 'Plus Jakarta Sans'`;
        ctx.textAlign = "right";
        ctx.fillText("600", canvas.width - (MARGIN * s), canvas.height - (70 * s));
        ctx.restore();

        const m = MARGIN * s, b = BASE_S * s, z = parseFloat(ui.zoom.value);
        const r = parseInt(ui.rotation.value) * Math.PI / 180;
        const aspect = state.img.width / state.img.height;
        let dw = aspect > 1 ? (b * z * aspect) : (b * z), dh = aspect > 1 ? (b * z) : (b * z / aspect);

        // Kuvan koostaminen puskuriin
        buffer.width = b; buffer.height = b;
        bCtx.fillStyle = "#000"; bCtx.fillRect(0, 0, b, b);
        bCtx.save();
        bCtx.translate(b/2 + state.x * s, b/2 + state.y * s);
        bCtx.rotate(r);
        bCtx.drawImage(state.img, -dw/2, -dh/2, dw, dh);
        bCtx.restore();
        applyFilmEngine(bCtx, b, b);

        // Piirretään kuva kehykseen
        ctx.save();
        ctx.beginPath(); ctx.rect(m, m, b, b); ctx.clip();
        ctx.drawImage(buffer, m, m);

        // Kohina (Grain)
        const gVal = parseInt(ui.grain.value);
        if(gVal > 0) {
            ctx.save();
            ctx.globalCompositeOperation = 'overlay';
            ctx.globalAlpha = gVal / 255;
            const ptrn = ctx.createPattern(noiseBuffer, 'repeat');
            ctx.fillStyle = ptrn;
            ctx.fillRect(m, m, b, b);
            ctx.restore();
        }

        // Kiilto/Heijastus (Gloss)
        const glossVal = parseInt(ui.gloss.value);
        if(glossVal > 0) {
            ctx.save();
            const alpha = (glossVal / 100) * 1.5;
            const grad1 = ctx.createLinearGradient(m, m, m, m + b);
            grad1.addColorStop(0, `rgba(255,255,255,${0.4 * alpha})`);
            grad1.addColorStop(0.4, `rgba(255,255,255,${0.08 * alpha})`);
            grad1.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad1;
            ctx.fillRect(m, m, b, b);

            const grad2 = ctx.createRadialGradient(m + b*0.1, m + b*0.1, 0, m + b*0.1, m + b*0.1, b*0.8);
            grad2.addColorStop(0, `rgba(255,255,255,${0.7 * alpha})`);
            grad2.addColorStop(0.3, `rgba(255,255,255,${0.15 * alpha})`);
            grad2.addColorStop(0.8, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad2;
            ctx.fillRect(m, m, b, b);
            ctx.restore();
        }
        ctx.restore(); 

        // Tekstimerkintä kehyksen alaosaan
        if(ui.markerText.value) {
            const sm = parseFloat(ui.textSize.value);
            ctx.font = `${110 * s * sm}px 'Permanent Marker'`;
            ctx.fillStyle = "rgba(10,10,35,0.85)";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.save();
            const footerCenterY = (TOTAL_H * s - FOOTER * s) + (FOOTER * s / 2) + (30 * s);
            ctx.translate(canvas.width/2, footerCenterY);
            ctx.rotate(-0.01);
            ctx.fillText(ui.markerText.value, 0, 0);
            ctx.restore();
        }

        if(!highRes) {
            clearTimeout(window.rTimer);
            window.rTimer = setTimeout(() => draw(true), 500);
        }
    }

    const v = document.getElementById('viewport');
    const handleMove = (e) => {
        if(!state.isDragging || !state.img) return;
        const t = e.touches ? e.touches[0] : e;
        const f = TOTAL_W / canvas.clientWidth;
        state.x += (t.clientX - state.lastX) * f;
        state.y += (t.clientY - state.lastY) * f;
        state.lastX = t.clientX; state.lastY = t.clientY;
        draw(false);
    };

    v.addEventListener('mousedown', (e) => { state.isDragging = true; state.lastX = e.clientX; state.lastY = e.clientY; });
    v.addEventListener('touchstart', (e) => { state.isDragging = true; state.lastX = e.touches[0].clientX; state.lastY = e.touches[0].clientY; }, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => { if(state.isDragging) e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('mouseup', () => state.isDragging = false);
    window.addEventListener('touchend', () => state.isDragging = false);

    function showPreview() {
        if(!state.img) return;
        draw(true);
        const data = canvas.toDataURL('image/jpeg', 0.95);
        document.getElementById('previewImg').src = data;
        document.getElementById('previewOverlay').style.display = 'flex';
    }
    function hidePreview() { document.getElementById('previewOverlay').style.display = 'none'; }

    document.getElementById('exportBtn').addEventListener('click', function() {
        if(!state.img) return;
        const btn = this;
        btn.innerText = "DEVELOPING...";
        btn.disabled = true;
        setTimeout(() => {
            draw(true);
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `polaroid_600_${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                showPreview(); 
                setTimeout(() => {
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    btn.innerText = "Develop Photo";
                    btn.disabled = false;
                }, 100);
            }, 'image/jpeg', 0.95);
        }, 100);
    });

    updateLabels();
</script>
</body>
</html>
