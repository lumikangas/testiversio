<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maantiedon Guru: Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Outfit:wght@400;900&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-yellow: #f8ff00;
            --gold: #facc15;
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: white; 
            overflow: hidden;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 0;
        }

        .bungee { font-family: 'Bungee Inline', cursive; }

        .glass { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 1s ease;
        }

        #particle-canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        .turbo-btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 10px 20px rgba(188, 19, 254, 0.3);
            transition: all 0.3s ease;
        }

        @keyframes pulse-gold {
            0% { filter: drop-shadow(0 0 5px var(--gold)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px var(--gold)); transform: scale(1.15); }
            100% { filter: drop-shadow(0 0 5px var(--gold)); transform: scale(1); }
        }
        .crown-animate { animation: pulse-gold 2.5s infinite ease-in-out; }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fade-up 1s ease-out forwards; }

        .gold-glow {
            box-shadow: 0 0 60px rgba(250, 204, 21, 0.6);
            border: 3px solid var(--gold) !important;
        }

        .option-btn {
            text-align: left;
            padding: 1rem 1.25rem;
            border-radius: 1.25rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 800;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            color: white;
            cursor: pointer;
        }
        
        .option-btn.correct { background: #22c55e !important; border-color: #4ade80; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        .option-btn.wrong { background: #ef4444 !important; border-color: #f87171; }

        .flag-huge {
            font-size: clamp(4.5rem, 20vw, 8rem);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
            line-height: 1;
        }

        #commentary-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            pointer-events: none;
            width: 90%;
            display: flex;
            justify-content: center;
        }

        #commentary-inner {
            opacity: 0;
            background: #facc15;
            color: black;
            padding: 1.25rem 2.5rem;
            border-radius: 3rem;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 4px solid #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .commentary-pop { animation: commentaryAnim 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes commentaryAnim {
            0% { transform: scale(0.5) rotate(-15deg); opacity: 0; }
            20% { transform: scale(1.1) rotate(5deg); opacity: 1; }
            80% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0.8) translateY(-50px); opacity: 0; }
        }

        .progress-bar-inner { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-4">
    <canvas id="particle-canvas"></canvas>
    
    <div id="app" class="max-w-md w-full relative z-10 h-full flex flex-col justify-between py-4 mx-auto">
        
        <div id="commentary-container"><div id="commentary-inner"><span id="commentary-text"></span></div></div>

        <!-- Yläpalkki -->
        <div class="flex-none flex justify-between items-end mb-4 px-1">
            <div class="flex-1">
                <h1 class="text-4xl bungee text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">GEOGURU</h1>
                <div class="w-full bg-white/10 h-1.5 rounded-full mt-2 max-w-[120px] overflow-hidden">
                    <div id="progress-bar" class="progress-bar-inner bg-cyan-400 h-full" style="width: 0%"></div>
                </div>
            </div>
            <div class="glass px-5 py-2 rounded-2xl flex flex-col items-end">
                <span id="score" class="text-3xl font-black tabular-nums">0</span>
                <div id="combo-display" class="hidden text-[10px] font-black text-yellow-400 uppercase">COMBO X<span id="combo-val">1.0</span></div>
            </div>
        </div>

        <!-- Pääkortti -->
        <div id="main-card" class="glass rounded-[2.5rem] flex-1 flex flex-col relative overflow-hidden">
            <div id="game-content" class="p-6 flex-grow flex flex-col h-full">
                
                <!-- ALOITUS -->
                <div id="view-start" class="text-center flex flex-col justify-center h-full space-y-6">
                    <div class="w-20 h-20 mx-auto bg-gradient-to-br from-cyan-500 to-blue-600 rounded-3xl flex items-center justify-center shadow-2xl rotate-3">
                        <i class="fa-solid fa-globe text-3xl text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black uppercase italic">195 Maan Maraton</h2>
                        <p class="text-white/50 text-xs font-bold uppercase tracking-widest mt-1">Oletko valmis haasteeseen?</p>
                    </div>

                    <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                        <p class="text-[10px] font-black text-cyan-400 tracking-widest uppercase mb-3">PÄIVÄN PARHAAT</p>
                        <div id="leaderboard-list" class="space-y-2"></div>
                    </div>

                    <button id="btn-start" class="w-full py-5 turbo-btn text-white font-black rounded-2xl tracking-widest text-lg uppercase active:scale-95">
                        ALOITA MATKA
                    </button>
                </div>

                <!-- VISA -->
                <div id="view-quiz" class="hidden flex flex-col h-full justify-between">
                    <div class="flex justify-between items-center text-[10px] font-black tracking-widest mb-4">
                        <div class="bg-white/10 px-4 py-1.5 rounded-full text-cyan-400">MAA <span id="current-q-num">1</span> / 195</div>
                        <div class="bg-orange-500/20 text-orange-400 px-4 py-1.5 rounded-full flex items-center gap-2">
                            <i class="fa-solid fa-fire"></i> <span id="streak-val">0</span>
                        </div>
                    </div>
                    <div class="flex-grow flex flex-col justify-center space-y-6 text-center">
                        <div id="flag-display" class="flag-huge"></div>
                        <h2 id="question-text" class="text-xl font-black text-white uppercase leading-tight px-4"></h2>
                    </div>
                    <div id="options-grid" class="grid grid-cols-1 gap-3 mt-6"></div>
                </div>

                <!-- PELI OHI -->
                <div id="view-gameover" class="hidden flex flex-col justify-center h-full text-center space-y-6">
                    <h2 class="text-5xl font-black italic text-red-500 uppercase">Ohi on!</h2>
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/10">
                        <p class="text-white/40 text-[10px] font-black mb-1 uppercase text-center">Oikea vastaus oli:</p>
                        <p id="correct-answer-was" class="text-xl font-black text-yellow-400 uppercase italic"></p>
                    </div>
                    <div class="flex justify-around bg-black/30 p-4 rounded-2xl">
                        <div class="text-center">
                            <p class="text-[10px] font-black text-white/40 uppercase">Maat</p>
                            <p id="fail-count" class="text-2xl font-black">0</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[10px] font-black text-white/40 uppercase">Pisteet</p>
                            <p id="final-score" class="text-2xl font-black text-cyan-400">0</p>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="player-name" maxlength="10" placeholder="NIMIMERKKI..." class="w-full p-4 bg-white/5 border-2 border-white/10 rounded-2xl text-white font-black uppercase text-center focus:outline-none focus:border-cyan-400">
                        <button id="btn-save-score" class="w-full py-5 turbo-btn text-white font-black rounded-2xl uppercase active:scale-95">TALLENNA TULOS</button>
                    </div>
                </div>

                <!-- VOITTO -->
                <div id="view-victory" class="hidden flex flex-col justify-center h-full text-center space-y-4">
                    <div class="relative pt-2">
                        <i class="fa-solid fa-crown text-7xl text-yellow-400 mb-2 crown-animate"></i>
                        <h2 class="text-4xl font-black bungee text-yellow-400 italic">ULTRA GURU</h2>
                    </div>
                    
                    <div class="space-y-1 animate-fade-up">
                        <p class="text-xl font-black text-white uppercase tracking-tighter italic">Huh huh! Olet äärimmäinen</p>
                        <p class="text-3xl font-black text-yellow-400 bungee">ULTRA GURU!</p>
                        <p class="text-lg font-bold text-cyan-400 uppercase tracking-widest mt-2">Onnittelut!</p>
                    </div>
                    
                    <div class="bg-yellow-400/10 border border-yellow-400/30 p-5 rounded-[2.5rem] mt-2">
                        <p class="text-[10px] font-black text-yellow-400 uppercase mb-1">LOPULLISET PISTEET</p>
                        <p id="victory-score-val" class="text-4xl font-black">0</p>
                    </div>

                    <div class="space-y-3 pt-2">
                        <input type="text" id="player-name-vic" maxlength="10" placeholder="NIMIMERKKI..." class="w-full p-4 bg-white/5 border-2 border-yellow-400/30 rounded-2xl text-white font-black uppercase text-center focus:outline-none focus:border-yellow-400">
                        <button id="btn-save-victory" class="w-full py-5 bg-yellow-400 text-black font-black rounded-2xl uppercase active:scale-95 shadow-[0_10px_30px_rgba(250,204,21,0.3)]">TALLENNA LEGENDOJEN JOUKKOON</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const MAAT = [
            {n:"Suomi",c:"Helsinki",f:"🇫🇮"}, {n:"Ruotsi",c:"Tukholma",f:"🇸🇪"}, {n:"Norja",c:"Oslo",f:"🇳🇴"}, {n:"Tanska",c:"Kööpenhamina",f:"🇩🇰"},
            {n:"Islanti",c:"Reykjavík",f:"🇮🇸"}, {n:"Viro",c:"Tallinna",f:"🇪🇪"}, {n:"Saksa",c:"Berliini",f:"🇩🇪"}, {n:"Ranska",c:"Pariisi",f:"🇫🇷"},
            {n:"USA",c:"Washington, D.C.",f:"🇺🇸"}, {n:"Japani",c:"Tokio",f:"🇯🇵"}, {n:"Brasilia",c:"Brasília",f:"🇧🇷"}, {n:"Australia",c:"Canberra",f:"🇦🇺"}
        ];

        let state = {
            score: 0, streak: 0, multiplier: 1.0, current: null,
            deck: [], isBusy: false, completed: 0,
            leaderboard: JSON.parse(localStorage.getItem('geo_scores') || '[]')
        };

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let audioCtx = null;
        let isVictoryActive = false;

        function init() {
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            updateLeaderboardUI();
            animate();
        }

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playSfx(freq, type = 'sine', duration = 0.2, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playEpicFanfare() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
            
            notes.forEach((freq, i) => {
                const startTime = now + (i * 0.4);
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = i % 2 === 0 ? 'triangle' : 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.15, startTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 1.2);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(startTime);
                osc.stop(startTime + 1.5);
            });

            const finalChord = [523.25, 659.25, 783.99, 1046.50];
            const chordStart = now + 3.0;
            
            finalChord.forEach(freq => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, chordStart);
                
                gain.gain.setValueAtTime(0, chordStart);
                gain.gain.linearRampToValueAtTime(0.1, chordStart + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.001, chordStart + 2.0);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(chordStart);
                osc.stop(chordStart + 2.5);
            });
        }

        function nextQuestion() {
            if (state.deck.length === 0) { victory(); return; }
            state.isBusy = false;
            state.current = state.deck.pop();
            state.completed++;
            
            const pool = MAAT.map(m => m.c);
            let options = [state.current.c];
            while(options.length < 4) {
                const r = pool[Math.floor(Math.random() * pool.length)];
                if(!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);

            document.getElementById('flag-display').innerText = state.current.f;
            document.getElementById('question-text').innerText = state.current.n;
            document.getElementById('current-q-num').innerText = state.completed;
            document.getElementById('progress-bar').style.width = `${(state.completed / MAAT.length) * 100}%`;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => checkAnswer(opt, btn);
                grid.appendChild(btn);
            });
            showView('quiz');
        }

        function checkAnswer(val, btn) {
            if (state.isBusy) return;
            state.isBusy = true;
            const isCorrect = val === state.current.c;
            if (isCorrect) {
                btn.classList.add('correct');
                state.streak++;
                state.multiplier = Math.min(5, 1 + (state.streak * 0.1));
                state.score += Math.floor(100 * state.multiplier);
                playSfx(600 + (state.streak * 20));
                showCommentary(true);
                updateStats();
                setTimeout(nextQuestion, 1200);
            } else {
                btn.classList.add('wrong');
                playSfx(150, 'sawtooth', 0.5);
                document.getElementById('main-card').classList.add('shake-effect');
                Array.from(document.querySelectorAll('.option-btn')).forEach(b => {
                    if (b.innerText === state.current.c) b.classList.add('correct');
                });
                showCommentary(false);
                setTimeout(gameOver, 1500);
            }
        }

        function victory() {
            initAudio();
            isVictoryActive = true;
            document.getElementById('main-card').classList.add('gold-glow');
            document.getElementById('victory-score-val').innerText = state.score;
            playEpicFanfare();
            showView('victory');
        }

        function showView(id) {
            ['start', 'quiz', 'gameover', 'victory'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
            });
            document.getElementById(`view-${id}`).classList.remove('hidden');
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (Math.random() < 0.05) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height + 10,
                    v: Math.random() * 2 + 0.5,
                    s: Math.random() * 2,
                    o: Math.random() * 0.5 + 0.1,
                    c: isVictoryActive ? '250, 204, 21' : '0, 242, 255',
                    type: 'bg'
                });
            }

            if (isVictoryActive && Math.random() < 0.3) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    v: -(Math.random() * 4 + 3),
                    s: Math.random() * 6 + 4,
                    o: 1,
                    c: ['250, 204, 21', '255, 255, 255', '188, 19, 254', '0, 242, 255'][Math.floor(Math.random()*4)],
                    rot: Math.random() * Math.PI,
                    rotV: Math.random() * 0.2 - 0.1,
                    type: 'confetti'
                });
            }

            particles.forEach((p, i) => {
                p.y -= p.v;
                if (p.type === 'confetti') {
                    p.rot += p.rotV;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.fillStyle = `rgba(${p.c}, ${p.o})`;
                    ctx.fillRect(-p.s/2, -p.s/2, p.s, p.s);
                    ctx.restore();
                } else {
                    ctx.fillStyle = `rgba(${p.c}, ${p.o})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (p.y < -50 || p.y > canvas.height + 50) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        function showCommentary(isGood) {
            const txt = isGood ? "VAU!" : "HUPS!";
            const el = document.getElementById('commentary-inner');
            document.getElementById('commentary-text').innerText = txt;
            el.style.background = isGood ? '#facc15' : '#ef4444';
            el.classList.remove('commentary-pop');
            void el.offsetWidth;
            el.classList.add('commentary-pop');
        }

        function updateStats() {
            document.getElementById('score').innerText = state.score;
            document.getElementById('streak-val').innerText = state.streak;
            if (state.streak > 1) {
                document.getElementById('combo-display').classList.remove('hidden');
                document.getElementById('combo-val').innerText = state.multiplier.toFixed(1);
            }
        }

        function gameOver() {
            document.getElementById('main-card').classList.remove('shake-effect');
            document.getElementById('correct-answer-was').innerText = state.current.c;
            document.getElementById('fail-count').innerText = state.completed - 1;
            document.getElementById('final-score').innerText = state.score;
            showView('gameover');
        }

        function saveScore(isVictory = false) {
            const id = isVictory ? 'player-name-vic' : 'player-name';
            const name = document.getElementById(id).value.trim().toUpperCase() || "ANONYYMI";
            state.leaderboard.push({ name, score: state.score });
            state.leaderboard.sort((a, b) => b.score - a.score);
            state.leaderboard = state.leaderboard.slice(0, 5);
            localStorage.setItem('geo_scores', JSON.stringify(state.leaderboard));
            updateLeaderboardUI();
            resetGame();
        }

        function resetGame() {
            isVictoryActive = false; state.score = 0; state.streak = 0; state.completed = 0;
            document.getElementById('main-card').classList.remove('gold-glow');
            document.getElementById('combo-display').classList.add('hidden');
            document.getElementById('progress-bar').style.width = '0%';
            updateStats(); showView('start');
        }

        function updateLeaderboardUI() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = state.leaderboard.map((s, i) => `
                <div class="flex justify-between items-center bg-white/5 px-3 py-1 rounded-lg text-[11px] font-bold">
                    <span>${i+1}. ${s.name}</span>
                    <span class="text-cyan-400">${s.score}</span>
                </div>
            `).join('') || '<p class="text-[10px] text-white/20 italic">Ei tuloksia vielä...</p>';
        }

        document.getElementById('btn-start').onclick = () => {
            initAudio();
            state.deck = [...MAAT].sort(() => Math.random() - 0.5);
            nextQuestion();
        };
        document.getElementById('btn-save-score').onclick = () => saveScore(false);
        document.getElementById('btn-save-victory').onclick = () => saveScore(true);

        init();
    </script>
</body>
</html>
